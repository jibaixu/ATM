defaults:
  - _self_

experiment: ??? # tag for wandb and log dir

hydra:
  run:
    dir: ./results/track_transformer/${now:%m%d}_${experiment}_${now:%H%M}
  sweep:
    dir: ./results/track_transformer/${now:%m%d}_${experiment}_${now:%H%M}
    subdir: ${hydra.job.num}

wandb:
  project: atm_robocoin_action
  name: ${now:%m%d}_${experiment}_${now:%H%M}_${hydra:job.num}
  group: ${experiment}

train_gpus: [0] # deprecated for this script; use `accelerate launch --num_processes ...`
distributed:
  backend: deepspeed
  zero_stage: 2
  offload_optimizer_device: none
  offload_param_device: none

# Training
lr: 1e-4
batch_size: ???
gradient_accumulation_steps: 4
mix_precision: true
num_workers: 8
val_freq: 1
save_freq: 1
clip_grad: 2.
epochs: 1001
seed: 42
dry: false

debug:
  enable: true
  check_inputs_every_n_steps: 1
  log_stats_every_n_steps: 50
  check_params_every_n_steps: 1
  fail_on_nonfinite: true
  fail_on_large_loss: true
  loss_threshold: 1e4
  fail_on_large_grad_norm: true
  grad_norm_threshold: 1e4
  fail_on_large_param_absmax: false
  param_absmax_threshold: 1e4
  detect_anomaly: false
  save_snapshot_on_error: true
  preview_items: 16
  topk_items: 8
  input_thresholds:
    vid_abs_max: 512.0
    track_abs_max: null
    action_abs_max: 5.0
    task_emb_abs_max: 1e3
    vis_min: -1e-3
    vis_max: 1.001

model_name: TrackTransformerAction
p_img: 0.5
lbd_track: 10.0
lbd_img: 1.0

# # Model Capacity 0.1B
# dim: 768
# dim_head: null
# heads: 8
# depth: 16

# Model Capacity 0.01B
dim: 384
dim_head: null
heads: 8
depth: 8

img_size: [240, 320]
frame_stack: 1
num_track_ts: 20
num_track_ids: ???
patch_size: 16
track_patch_size: 4

aug_prob: 0.9

train_jsonl: ???
val_jsonl: ???
train_dataset_dir: ???
val_dataset_dir: ???
stat_path: ???

model_load_path: null

optimizer_cfg:
  type: optim.Adam
  params:
    lr: ${lr}
    weight_decay: 0

scheduler_cfg:
  type: CosineAnnealingLRWithWarmup
  params:
    warmup_lr: 1e-5
    warmup_epoch: 5
    T_max: ${epochs}

model_cfg:
  load_path: ${model_load_path}
  transformer_cfg:
    dim: ${dim}
    dim_head: ${dim_head}
    heads: ${heads}
    depth: ${depth}
    attn_dropout: 0.2
    ff_dropout: 0.2
  track_cfg:
    num_track_ts: ${num_track_ts}
    num_track_ids: ${num_track_ids}
    patch_size: ${track_patch_size}
  vid_cfg:
    img_size: ${img_size}
    frame_stack: ${frame_stack}
    patch_size: ${patch_size}
  language_encoder_cfg:
    network_name: MLPEncoder
    input_size: 768
    hidden_size: 128
    num_layers: 1

dataset_cfg:
  img_size: ${img_size}
  frame_stack: ${frame_stack}
  num_track_ts: ${num_track_ts}
  num_track_ids: ${num_track_ids}
  cache_all: false
  cache_image: false
  cache_track: false
  stat_path: ${stat_path}
  norm_clip_min: -1.0
  norm_clip_max: 1.0
  norm_eps: 1e-6
